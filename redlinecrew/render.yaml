services:
  - type: web
    name: redlinecrew
    runtime: php
    buildCommand: |
      mkdir -p uploads/products uploads/avatars logs
      chmod 755 uploads uploads/products uploads/avatars logs
    startCommand: php -S 0.0.0.0:$PORT -t . router.php
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: redlinecrew-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: redlinecrew-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: redlinecrew-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: redlinecrew-db
          property: database
      - key: SITE_URL
        sync: false   # Lo pones tú manualmente en el dashboard

databases:
  - name: redlinecrew-db
    databaseName: redlinecrew
    user: redlinecrew_user
    plan: free
