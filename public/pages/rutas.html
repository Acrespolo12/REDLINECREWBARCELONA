<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motorcycle Routes</title>
</head>
<body>
    <h1>Motorcycle Routes</h1>
    <form id="routeForm">
        <label for="routeName">Route Name:</label>
        <input type="text" id="routeName" name="routeName" required>
        <br>
        <label for="difficulty">Difficulty Level:</label>
        <select id="difficulty" name="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
        <br>
        <label for="distance">Distance (km):</label>
        <input type="number" id="distance" name="distance" required>
        <br>
        <input type="submit" value="Create Route">
    </form>
    <h2>Existing Routes</h2>
    <ul id="routeList">
        <!-- Existing routes will be listed here -->
    </ul>
    <script>
        document.getElementById('routeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const routeName = document.getElementById('routeName').value;
            const difficulty = document.getElementById('difficulty').value;
            const distance = document.getElementById('distance').value;
            const listItem = document.createElement('li');
            listItem.textContent = `Route: ${routeName}, Difficulty: ${difficulty}, Distance: ${distance} km`;
            document.getElementById('routeList').appendChild(listItem);
            this.reset();
        });
    </script>
</body>
</html>
